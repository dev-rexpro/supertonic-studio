<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<script>
			(function () {
				var originalFetch = window.fetch;
				var customFetch = originalFetch;
				try {
					Object.defineProperty(window, 'fetch', {
						get: function () {
							return customFetch;
						},
						set: function (val) {
							customFetch = val;
						},
						configurable: true,
						enumerable: true
					});
				} catch (e) {
					console.error('Failed to redefine window.fetch:', e);
				}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
		/>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
